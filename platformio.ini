	-D TFT_HEIGHT=240
	-D TFT_MISO=22
	-D TFT_MOSI=21
	-D TFT_SCK=20
	-D TFT_CS=17
	-D TFT_RST=16

	-D SPI_SCK_PIN=6
	-D SPI_MOSI_PIN=5
	-D SPI_MISO_PIN=4
